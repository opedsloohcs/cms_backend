# src/modules/lesson/lesson.schema.graphql
# CHANGED:
#   1. order: Int → String (fractional index)
#   2. Added section field to Lesson type (nullable — null = root level)
#   3. Added LessonSection sub-type
#   4. Added sectionId to LessonFiltersInput
#   5. Added section to CreateLessonInput and UpdateLessonInput
#   6. Removed parentId from all types (replaced by section)
#   7. lessonSidebar now returns SidebarData (sections + rootLessons)
#   8. Added SidebarSection, SidebarLesson, SidebarData types
#   9. Removed required (!) from all fields except title in CreateLessonInput
#      and LessonMetaInput

scalar Date

# ── Enums ─────────────────────────────────────────────────────────────────────

enum LessonType {
  single
  grouped
}

# ── Sub-types ─────────────────────────────────────────────────────────────────

type LessonMeta {
  title: String!
  description: String!
  keywords: [String]!
}

type LessonCourse {
  id: ID!
  name: String
}

# New — the section a lesson belongs to (null = root level)
type LessonSection {
  id: ID!
  name: String
}

# ── Main type ─────────────────────────────────────────────────────────────────

type Lesson {
  id: ID!
  title: String!
  slug: String!
  fullSlug: String
  description: String
  course: Course!
  section: Section           # null = root level under course
  type: LessonType!
  order: String!                   # fractional index string
  content: String
  isPublished: Boolean!
  publishedAt: Date
  isDeleted: Boolean!
  meta: LessonMeta!
  createdAt: Date
  updatedAt: Date
}

# ── Sidebar types (returned by lessonSidebar query) ───────────────────────────

type SidebarLesson {
  id: ID!
  title: String!
  slug: String!
  fullSlug: String
  order: String!
  type: LessonType!
  isPublished: Boolean!
}

type SidebarSection {
  id: ID!
  name: String!
  slug: String!
  order: String!
  lessons: [SidebarLesson!]!
}

type SidebarData {
  sections: [SidebarSection!]!
  rootLessons: [SidebarLesson!]!
}

# ── Input types ───────────────────────────────────────────────────────────────

input LessonMetaInput {
  title: String!             # required
  description: String
  keywords: [String]
}

input CreateLessonInput {
  title: String!             # required
  slug: String
  description: String
  course: ID
  section: ID              # null = root level, omit or pass null
  type: LessonType
  order: String            # fractional index string
  content: String
  isPublished: Boolean
  meta: LessonMetaInput
}

input UpdateLessonInput {
  title: String
  slug: String
  description: String
  course: ID
  section: ID              # pass null to move lesson to root level
  type: LessonType
  order: String            # fractional index string
  content: String
  isPublished: Boolean
  meta: LessonMetaInput
}

# ── Filters & pagination ──────────────────────────────────────────────────────

input LessonFiltersInput {
  courseId: ID
  sectionId: ID            # pass null to get root-level lessons only
  isPublished: Boolean
  isDeleted: Boolean
  type: LessonType
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type LessonEdge {
  cursor: String!
  node: Lesson!
}

type LessonConnection {
  edges: [LessonEdge!]
  pageInfo: PageInfo!
  totalCount: Int!
  published: Int!
  draft: Int!
}

# ── Queries ───────────────────────────────────────────────────────────────────

type Query {
  lesson(id: ID, slug: String): Lesson

  lessons(
    filters: LessonFiltersInput
    first: Int
    after: String
  ): LessonConnection!

  recentLessons(limit: Int): [Lesson!]!

  # Returns full sidebar tree — sections with their lessons + root level lessons
  lessonSidebar(courseId: ID!): SidebarData!
}

# ── Mutations ─────────────────────────────────────────────────────────────────

type Mutation {
  createLesson(input: CreateLessonInput): Lesson!
  updateLesson(id: ID!, input: UpdateLessonInput!): Lesson!
  deleteLesson(id: ID!): DeleteLessonPayload!
  restoreLesson(id: ID!): Lesson!
  publishLesson(id: ID!): Lesson!
  unpublishLesson(id: ID!): Lesson!
}

type DeleteLessonPayload {
  success: Boolean!
  message: String
  id: ID!
}